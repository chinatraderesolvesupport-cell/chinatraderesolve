<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Вход администратора — ChinaTradeResolve</title><style>
:root{--teal:#14b8a6;--light:#f8fafc;--ink:#0f172a;--muted:#64748b}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--light);color:var(--ink);line-height:1.5}a{color:#0f766e}.wrap{width:min(1180px,94%);margin:28px auto}.top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}.brand{font-weight:900;font-size:22px}.brand span{color:var(--teal)}.card{background:white;border:1px solid #e2e8f0;border-radius:15px;padding:20px;margin:16px 0;box-shadow:0 8px 24px #0f172a0a}.btn{display:inline-flex;padding:10px 14px;border-radius:9px;border:1px solid #94a3b8;background:white;color:#0f172a;font-weight:800;text-decoration:none;cursor:pointer}.btn.primary{background:var(--teal);border-color:var(--teal)}.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#e2e8f0;font-size:12px;font-weight:800}.risk-critical,.risk-high{background:#fee2e2;color:#991b1b}.risk-medium{background:#fef3c7;color:#92400e}.risk-low{background:#d1fae5;color:#065f46}table{width:100%;border-collapse:collapse;background:white}th,td{padding:10px;border-bottom:1px solid #e2e8f0;text-align:left;vertical-align:top}th{font-size:12px;text-transform:uppercase;color:#64748b}input,select,textarea{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px}textarea{min-height:100px}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.metric{background:white;border:1px solid #e2e8f0;border-radius:12px;padding:15px}.metric strong{display:block;font-size:25px}pre{white-space:pre-wrap;word-break:break-word;background:#0f172a;color:#e2e8f0;padding:14px;border-radius:10px}.muted{color:#64748b}.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}.login{width:min(420px,92%);margin:10vh auto}@media(max-width:800px){.grid,.row{grid-template-columns:1fr}table{display:block;overflow-x:auto}}
</style></head><body><div class="login card"><div class="brand">ChinaTrade<span>Resolve</span></div><h1>Вход администратора</h1>{% if error %}<p style="color:#b91c1c">{{ error }}</p>{% endif %}<form method="post" autocomplete="off"><label>Токен администратора<input type="password" name="token" required autofocus autocomplete="off" autocapitalize="none" spellcheck="false"></label><p><button class="btn primary" type="submit">Войти</button></p></form><p class="muted">Для входа нужны безопасные переменные ADMIN_TOKEN и APP_SECRET в Render. Оба значения должны быть разными, случайными и длиной не менее 32 символов.</p></div></body></html>
